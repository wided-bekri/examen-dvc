stages:
  split:
    cmd: python3 src/data/data_split.py
    deps:
    - data/raw.csv
    - src/data/data_split.py
    outs:
    - data/X_test.csv
    - data/X_train.csv
    - data/y_test.csv
    - data/y_train.csv
  normalize:
    cmd: python3 src/data/normalize.py
    deps:
    - data/X_test.csv
    - data/X_train.csv
    - src/data/normalize.py
    outs:
    - data/X_test_scaled.csv
    - data/X_train_scaled.csv
  gridsearch:
    cmd: python3 src/models/grid_search.py
    deps:
    - data/X_train_scaled.csv
    - data/y_train.csv
    - src/models/grid_search.py
    outs:
    - models/best_params.pkl
  training:
    cmd: python3 src/models/training.py
    deps:
    - data/X_train_scaled.csv
    - data/y_train.csv
    - models/best_params.pkl
    - src/models/training.py
    outs:
    - models/gbr_model.pkl
  evaluate:
    cmd: python3 src/models/evaluate.py
    deps:
    - data/X_test_scaled.csv
    - data/y_test.csv
    - models/gbr_model.pkl
    - src/models/evaluate.py
    outs:
    - data/prediction.csv
    metrics:
    - metrics/scores.json
